name: Build Android App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        run: npm install

      - name: Install Capacitor CLI (local)
        run: npm install --save-dev @capacitor/cli

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Locate Android build-tools
        id: buildtools
        run: |
          BT_DIR=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -type d | sort -V | tail -1)
          echo "path=$BT_DIR" >> "$GITHUB_OUTPUT"

      - name: Zipalign release APK
        run: |
          "${{ steps.buildtools.outputs.path }}/zipalign" -v 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            app-release-aligned.apk

      - name: Sign release APK
        run: |
          "${{ steps.buildtools.outputs.path }}/apksigner" sign \
            --ks release.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out ProInvoicer-release-signed.apk \
            app-release-aligned.apk

      - name: Verify signature
        run: |
          "${{ steps.buildtools.outputs.path }}/apksigner" verify --print-certs ProInvoicer-release-signed.apk

      - name: Clean up keystore file
        if: always()
        run: rm -f release.jks

      - name: Collect output APKs
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/ProInvoicer-debug.apk
          cp ProInvoicer-release-signed.apk output/ProInvoicer-release-signed.apk

      - name: Upload APKs as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pro-invoicer-apk
          path: output/*.apk

      - name: Create GitHub Release with signed APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Pro Invoicer - Build #${{ github.run_number }}"
          files: output/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          npm install
          npm install -g @capacitor/cli

      - name: Sync Capacitor
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Generate Keystore
        run: |
          cd android/app
          keytool -genkey -v -keystore release.keystore -alias proinvoicer -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Pro Invoicer, OU=Dev, O=Company, L=City, S=State, C=US" -storepass 123456 -keypass 123456

      - name: Build Signed APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        run: |
          cd android/app/build/outputs/apk/release
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 -keystore ../../../../../android/app/release.keystore app-release-unsigned.apk proinvoicer -storepass 123456 -keypass 123456
          zipalign -v -p 4 app-release-unsigned.apk app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pro-Invoicer-Signed
          path: android/app/build/outputs/apk/release/app-release.apk
